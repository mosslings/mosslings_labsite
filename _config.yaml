# site properties and page defaults
title: Moss lab
subtitle: IISER Thiruvananthapuram, India
description: Our lab explores the fascinating world of bryophytes, particularly mosses. These tiny giants, exquisitely adapted to their microhabitats, represent an alternative evolutionary strategy to that of tall vascular plants. We seek to uncover the “mossy way of life” across genetic, developmental, physiological, and ecological scales. Through integrative studies spanning laboratory and field biology, we investigate how mosses achieve resilience, environmental sensing, and carbon capture. By understanding these modern plants, we aim to uncover fundamental biological principles and inspire innovative applications in sustainability and climate biology.
header: images/Terrarium.JPEG
footer: images/background.jpg
proofer: false

